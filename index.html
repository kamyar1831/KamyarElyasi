<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ====================================================
                   CSS VARIABLES & RESET
                   ==================================================== */
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.1);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --accent: #60a5fa;
            --accent-dark: #3b82f6;
            --accent-glow: rgba(96, 165, 250, 0.15);
            --border-color: #334155;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            transition: var(--transition);
            min-height: 100vh;
        }

        /* ====================================================
                   SCROLLBAR
                   ==================================================== */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        /* ====================================================
                   CONTAINER
                   ==================================================== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ====================================================
                   HEADER / NAVBAR - ALWAYS RTL
                   ==================================================== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            padding: 16px 0;
            transition: var(--transition);
            direction: rtl;
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-icon {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 14px;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-icon:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--gradient);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        /* ====================================================
                   HERO SECTION
                   ==================================================== */
        .hero {
            padding: 60px 0 40px;
        }

        .hero-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 48px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .hero-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 6px;
            height: 100%;
            background: var(--gradient);
        }

        .hero-card::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--accent-glow);
            opacity: 0.3;
            pointer-events: none;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
            position: relative;
            z-index: 1;
        }

        .hero-avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 8px 32px var(--accent-glow);
            margin-bottom: 16px;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .hero-title .highlight {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .hero-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px 24px;
            background: var(--bg-hover);
            padding: 20px 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .hero-info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .hero-info-item strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .hero-actions .btn-primary {
            text-decoration: none;
        }

        /* ====================================================
                   SKILLS SECTION
                   ==================================================== */
        .section {
            padding: 40px 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            padding-right: 16px;
            border-right: 4px solid var(--accent);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
        }

        /* ===== Skill Card (always open) ===== */
        .skill-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .skill-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .skill-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .skill-card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .skill-card-title .skill-icon {
            font-size: 1.8rem;
            line-height: 1;
        }

        .skill-level-badge {
            font-size: 0.8rem;
            padding: 4px 16px;
            border-radius: 20px;
            font-weight: 600;
            white-space: nowrap;
        }

        .skill-level-badge.professional {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .skill-level-badge.intermediate {
            background: #fef3c7;
            color: #d97706;
        }

        .skill-level-badge.good {
            background: #d1fae5;
            color: #059669;
        }

        .skill-level-badge.learning {
            background: #fce4ec;
            color: #dc2626;
        }

        [data-theme="dark"] .skill-level-badge.professional {
            background: #1e3a5f;
            color: #60a5fa;
        }
        [data-theme="dark"] .skill-level-badge.intermediate {
            background: #3d2e1a;
            color: #fbbf24;
        }
        [data-theme="dark"] .skill-level-badge.good {
            background: #1a3d2e;
            color: #34d399;
        }
        [data-theme="dark"] .skill-level-badge.learning {
            background: #3d1a1a;
            color: #f87171;
        }

        .skill-card-body {
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }

        .skill-card-body h4 {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 12px 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .skill-tag {
            background: var(--bg-hover);
            padding: 4px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .skill-tag::before {
            content: "✓ ";
            color: var(--accent);
            font-weight: 700;
        }

        .skill-projects {
            list-style: none;
            padding: 0;
        }

        .skill-projects li {
            padding: 6px 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .skill-projects li::before {
            content: "▸";
            color: var(--accent);
            font-weight: 700;
        }

        /* ====================================================
                   FOOTER
                   ==================================================== */
        footer {
            text-align: center;
            padding: 40px 0 30px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            margin-top: 40px;
        }

        footer .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        footer .social-links a {
            color: var(--text-muted);
            font-size: 1.6rem;
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
        }

        footer .social-links a:hover {
            color: var(--accent);
            transform: translateY(-2px);
        }

        /* ====================================================
                   RESPONSIVE
                   ==================================================== */
        @media (max-width: 968px) {
            .hero-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .hero-avatar {
                margin: 0 auto 16px;
            }
            .hero-info-grid {
                grid-template-columns: 1fr;
                text-align: right;
            }
            .hero-actions {
                justify-content: center;
            }
            .section-title {
                font-size: 1.4rem;
            }
            .skills-grid {
                grid-template-columns: 1fr;
            }
            .hero-card {
                padding: 28px;
            }
            .navbar .container {
                flex-direction: column;
                align-items: stretch;
            }
            .navbar-actions {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .container { padding: 0 16px; }
            .hero-title { font-size: 1.8rem; }
            .hero-card { padding: 20px; }
            .skill-card-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>

    <script>
        (function() {
            'use strict';

            // ================================================
            // DATA -直接从JSON导入
            // ================================================
            const SKILLS_DATA = [{
                "id": "s1",

            }, {

            }, {

                ],

            }, {
                "id": "s4",

                "icon": "📜",
                "level": "خوب",
                "tags": [
                    "Loops & Conditionals",
                    "Cron Jobs",

                ],
                "projects": [

                    "مدیریت لاگ‌ها"
                ]
            }, {
                "id": "s5",
                "name": "Git",
                "icon": "🔀",
                "level": "خوب",
                "tags": [
                    "Branching",
                    "Merging",
                    "Rebasing",
                    "Pull Requests",

                ],
                "projects": [

                ]
            }, {

            }, {

                    "طراحی سایت شخصی",
                    "رزومه تعاملی",
                    "پروژه‌های فرانت‌اند"

            }];

            // ================================================
            // STATE
            // ================================================
            let currentLang = 'fa';
            let currentTheme = 'light';

            // ================================================
            // DOM REFS
            // ================================================
            const skillsContainer = document.getElementById('skillsContainer');
            const themeToggle = document.getElementById('themeToggle');
            const langToggle = document.getElementById('langToggle');
            const langLabel = document.getElementById('langLabel');
            const downloadResume = document.getElementById('downloadResume');

            // ================================================
            // UTILITY FUNCTIONS
            // ================================================
            function getLevelClass(level) {
                if (level === 'حرفه‌ای') return 'professional';
                if (level === 'خوب') return 'good';
                if (level === 'متوسط') return 'intermediate';
                return 'learning';
            }

            function getLevelEn(level) {
                const map = { 'حرفه‌ای': 'Professional', 'خوب': 'Good', 'متوسط': 'Intermediate', 'در حال یادگیری': 'Learning' };
                return map[level] || level;
            }

            // ================================================
            // RENDER
            // ================================================
            function renderSkills() {
                if (!skillsContainer) return;

                skillsContainer.innerHTML = SKILLS_DATA.map((skill) => {
                    const levelClass = getLevelClass(skill.level);
                    const levelDisplay = currentLang === 'fa' ? skill.level : getLevelEn(skill.level);

                    const tagsHtml = skill.tags.map(t => 
                        `<span class="skill-tag">${t}</span>`
                    ).join('');

                    const projectsHtml = skill.projects.map(p => 
                        `<li>${p}</li>`
                    ).join('');

                    return `
                        <div class="skill-card" data-id="${skill.id}">
                            <div class="skill-card-header">
                                <div class="skill-card-title">
                                    <span class="skill-icon">${skill.icon || '🛠️'}</span>
                                    <span>${skill.name}</span>
                                </div>
                                <span class="skill-level-badge ${levelClass}">${levelDisplay}</span>
                            </div>
                            <div class="skill-card-body">
                                <h4 data-fa="📌 مهارت‌ها" data-en="📌 Skills">📌 مهارت‌ها</h4>
                                <div class="skill-tags">${tagsHtml}</div>
                                <h4 data-fa="📁 پروژه‌ها" data-en="📁 Projects">📁 پروژه‌ها</h4>
                                <ul class="skill-projects">${projectsHtml}</ul>
                            </div>
                        </div>
                    `;
                }).join('');

                // Update language for new elements
                updateTexts();
            }

            // ================================================
            // UPDATE TEXTS
            // ================================================
            function updateTexts() {
                document.querySelectorAll('[data-fa][data-en]').forEach(el => {
                    if (el.closest('.navbar')) return;
                    const text = currentLang === 'fa' ? el.getAttribute('data-fa') : el.getAttribute('data-en');
                    if (text) el.textContent = text;
                });

                // Update skill level badges
                document.querySelectorAll('.skill-card').forEach((card, index) => {
                    const badge = card.querySelector('.skill-level-badge');
                    if (badge && SKILLS_DATA[index]) {
                        const skill = SKILLS_DATA[index];
                        badge.textContent = currentLang === 'fa' ? skill.level : getLevelEn(skill.level);
                        badge.className = 'skill-level-badge ' + getLevelClass(skill.level);
                    }
                });

                langLabel.textContent = currentLang === 'fa' ? 'فا' : 'EN';

                if (currentLang === 'fa') {
                    document.body.setAttribute('dir', 'rtl');
                    document.documentElement.setAttribute('lang', 'fa');
                } else {
                    document.body.setAttribute('dir', 'ltr');
                    document.documentElement.setAttribute('lang', 'en');
                }
            }

            // ================================================
            // LANGUAGE
            // ================================================
            function setLanguage(lang) {
                if (lang === currentLang) return;
                currentLang = lang;
                localStorage.setItem('resume_lang', lang);
                renderSkills();
            }

            // ================================================
            // THEME
            // ================================================
            function setTheme(theme) {
                currentTheme = theme;
                if (theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    themeToggle.textContent = '☀️';
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    themeToggle.textContent = '🌙';
                }
                localStorage.setItem('resume_theme', theme);
            }

            function getPreferredTheme() {
                const stored = localStorage.getItem('resume_theme');
                if (stored) return stored;
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    return 'dark';
                }
                return 'light';
            }

            // ================================================
            // DOWNLOAD RESUME
            // ================================================
            function downloadResumeHTML() {
                const html = document.documentElement.outerHTML;
                const blob = new Blob([
                    `<!DOCTYPE html>\n${html}`
                ], { type: 'text/html; charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `resume_kamyar_elyasi.html`;
                a.click();
                URL.revokeObjectURL(url);
            }

            // ================================================
            // INIT
            // ================================================
            function init() {
                const theme = getPreferredTheme();
                setTheme(theme);

                const lang = localStorage.getItem('resume_lang') || 'fa';
                currentLang = lang;
                renderSkills();

                themeToggle.addEventListener('click', () => {
                    setTheme(currentTheme === 'dark' ? 'light' : 'dark');
                });

                langToggle.addEventListener('click', () => {
                    setLanguage(currentLang === 'fa' ? 'en' : 'fa');
                });

                downloadResume.addEventListener('click', downloadResumeHTML);

                console.log('🚀 Resume loaded successfully');
                console.log('📊 Skills loaded:', SKILLS_DATA.length);
                console.log('🌐 Language:', currentLang);
                console.log('🎨 Theme:', currentTheme);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
